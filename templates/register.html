{% extends "base.html" %}
{% block content %}

<script src="https://unpkg.com/lucide@latest"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body, .page-wrapper {
    background: linear-gradient(135deg, rgba(2,0,36,1) 0%, rgba(9,9,121,1) 35%, rgba(0,212,255,1) 100%);
    min-height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }

  .page-wrapper {
    position: relative;
    overflow: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NOISE ── */
  .page-wrapper::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ── ORBS ── */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 450px; height: 450px; background: rgba(0,212,255,0.1); top: -80px; right: -80px; }
  .orb-2 { width: 320px; height: 320px; background: rgba(9,9,121,0.5); bottom: 5%; left: -60px; animation-delay: -5s; }
  .orb-3 { width: 200px; height: 200px; background: rgba(0,212,255,0.07); top: 50%; left: 55%; animation-delay: -9s; }

  @keyframes drift {
    from { transform: translateY(0px) scale(1); }
    to   { transform: translateY(28px) scale(1.04); }
  }

  /* ── NAV ── */
  .top-nav {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 48px;
    background: rgba(2,0,36,0.55);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,212,255,0.15);
  }

  .brand {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    color: #fff;
    text-decoration: none;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand svg {
    width: 20px;
    height: 20px;
    color: #00d4ff;
    animation: pulse-icon 1.4s ease-in-out infinite;
    stroke-width: 3;
  }

  @keyframes pulse-icon {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.35); }
  }

  .nav-link {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,212,255,0.75);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-link:hover { color: #fff; }

  /* ── MAIN ── */
  .main-content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  /* ── CARD ── */
  .auth-card {
    width: 100%;
    max-width: 460px;
    background: rgba(2,0,36,0.55);
    border: 1px solid rgba(0,212,255,0.18);
    border-radius: 18px;
    padding: 48px 44px;
    backdrop-filter: blur(24px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,212,255,0.05) inset;
    animation: cardUp 0.65s cubic-bezier(.22,.68,0,1.2) both;
    position: relative;
    overflow: hidden;
  }

  .auth-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, #00d4ff 50%, transparent 100%);
  }

  .auth-card::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(0,212,255,0.07), transparent 70%);
    pointer-events: none;
  }

  @keyframes cardUp {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── CARD HEADER ── */
  .card-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .card-icon svg {
    width: 28px;
    height: 28px;
    color: #00d4ff;
    stroke-width: 2;
  }

  .auth-card h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.65rem;
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(0,212,255,0.2);
  }

  .auth-card .subtitle {
    font-size: 0.95rem;
    color: rgba(200,230,255,0.55);
    font-weight: 400;
    margin-bottom: 36px;
    line-height: 1.5;
  }

  /* ── FORM ── */
  .form { display: flex; flex-direction: column; gap: 20px; }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(0,212,255,0.8);
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
    pointer-events: none;
    transition: opacity 0.2s;
    color: rgba(0, 212, 255, 0.7);
  }

  .form input {
    width: 100%;
    padding: 13px 16px 13px 42px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 8px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    outline: none;
    transition: all 0.25s ease;
  }

  .form input::placeholder { color: rgba(200,230,255,0.25); }

  .form input:focus {
    border-color: #00d4ff;
    background: rgba(0,212,255,0.06);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 20px rgba(0,212,255,0.08);
  }

  .form input:focus + .focus-line { width: 100%; }

  .form input:focus ~ .input-icon { opacity: 0.9; }

  /* ── PASSWORD STRENGTH ── */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }

  .strength-seg {
    height: 3px;
    flex: 1;
    border-radius: 2px;
    background: rgba(255,255,255,0.08);
    transition: background 0.3s ease;
  }

  .strength-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(200,230,255,0.35);
    margin-top: 5px;
    transition: color 0.3s;
  }

  /* ── SUBMIT BTN ── */
  .btn-submit {
    margin-top: 8px;
    padding: 14px;
    width: 100%;
    background: linear-gradient(135deg, #00d4ff, #0072ff);
    border: none;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #020024;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 28px rgba(0,212,255,0.3);
    position: relative;
    overflow: hidden;
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.18);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(0,212,255,0.5); }
  .btn-submit:hover::before { left: 160%; }
  .btn-submit:active { transform: translateY(0); }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 4px 0;
  }

  .divider span {
    flex: 1;
    height: 1px;
    background: rgba(0,212,255,0.12);
  }

  .divider p {
    font-size: 0.78rem;
    color: rgba(200,230,255,0.3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── FOOTER TEXT ── */
  .auth-footer {
    margin-top: 24px;
    text-align: center;
    font-size: 0.9rem;
    color: rgba(200,230,255,0.45);
    font-weight: 400;
  }

  .auth-footer a {
    color: #00d4ff;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .auth-footer a:hover { opacity: 0.75; text-decoration: underline; }

  /* ── TRUST BADGES ── */
  .trust-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,212,255,0.08);
  }

  .trust-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(200,230,255,0.3);
    font-weight: 600;
  }

  .trust-item svg {
    color: rgba(0, 212, 255, 0.6);
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .auth-card { padding: 36px 24px; }
    .top-nav { padding: 16px 20px; }
    .trust-row { flex-direction: column; align-items: center; gap: 10px; }
  }
</style>

<div class="page-wrapper">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- NAV -->
  <nav class="top-nav">
    <a class="brand" href="{{ url_for('index') }}">
      
      AI Doctor
    </a>
    <a class="nav-link" href="{{ url_for('index') }}">Back to Home</a>
  </nav>

  <div class="main-content">
    <div class="auth-card">

    
      <h1>Create Account</h1>
      <p class="subtitle">Join AI Doctor to begin your AI-assisted cardiology sessions.</p>

      <form method="post" class="form">

        <div class="field-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required autocomplete="new-password" oninput="checkStrength(this.value)" />
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-label" id="strength-label">Enter a password</div>
        </div>

        <button type="submit" class="btn-submit">Create Account →</button>
      </form>

      <div class="divider" style="margin-top:28px;">
        <span></span><p>or</p><span></span>
      </div>

      <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
      </p>

      <div class="trust-row">
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Encrypted
        </div>
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          Secure Storage
        </div>
        <div class="trust-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
          Edu Use Only
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  function checkStrength(val) {
    const segs = [document.getElementById('s1'), document.getElementById('s2'),
                  document.getElementById('s3'), document.getElementById('s4')];
    const label = document.getElementById('strength-label');
    const colors = ['#ff4444','#ff8800','#ffcc00','#00d4ff'];
    const labels = ['Weak','Fair','Good','Strong'];

    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    segs.forEach((s, i) => {
      s.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
    });

    if (val.length === 0) {
      label.textContent = 'Enter a password';
      label.style.color = 'rgba(200,230,255,0.35)';
    } else {
      label.textContent = labels[score - 1] || 'Too short';
      label.style.color = score > 0 ? colors[score - 1] : '#ff4444';
    }
  }
</script>

{% endblock %}
